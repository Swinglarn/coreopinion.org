<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F8F6"/>

  <!-- Large ghost "CO" -->
  <text x="620" y="520" font-family="Georgia,serif" font-size="600" font-weight="700"
        fill="#0A0C0F" opacity="0.028" text-anchor="middle" letter-spacing="-18">CO</text>

  <!-- Left navy border -->
  <rect x="0" y="0" width="5" height="630" fill="#1E4D8C"/>

  <!-- Compass card top-right — coloured quadrants -->
  <g transform="translate(940, 68)">
    <rect x="0" y="0" width="210" height="210" rx="12"
          fill="white" stroke="#DDD9D2" stroke-width="1" opacity="0.9"/>
    <!-- Quadrants -->
    <rect x="9" y="9" width="94" height="94" rx="4" fill="#4B8EF1" opacity="0.22"/>
    <rect x="107" y="9" width="94" height="94" rx="4" fill="#F5A623" opacity="0.22"/>
    <rect x="9" y="107" width="94" height="94" rx="4" fill="#3DBF82" opacity="0.22"/>
    <rect x="107" y="107" width="94" height="94" rx="4" fill="#E85D6B" opacity="0.22"/>
    <!-- Cross -->
    <line x1="105" y1="9" x2="105" y2="201" stroke="#DDD9D2" stroke-width="1.2"/>
    <line x1="9" y1="105" x2="201" y2="105" stroke="#DDD9D2" stroke-width="1.2"/>
    <!-- Labels -->
    <text x="13" y="22" font-size="9" fill="#B0B5BC" font-family="Outfit,sans-serif">Auth L</text>
    <text x="120" y="22" font-size="9" fill="#B0B5BC" font-family="Outfit,sans-serif">Auth R</text>
    <text x="13" y="200" font-size="9" fill="#B0B5BC" font-family="Outfit,sans-serif">Lib L</text>
    <text x="120" y="200" font-size="9" fill="#B0B5BC" font-family="Outfit,sans-serif">Lib R</text>
    <!-- Dot -->
    <circle cx="57" cy="153" r="11" fill="#1E4D8C"/>
    <circle cx="57" cy="153" r="18" fill="#1E4D8C" opacity="0.15"/>
  </g>

  <!-- Eyebrow -->
  <rect x="80" y="128" width="32" height="1.5" fill="#2A5DB0"/>
  <text x="124" y="140" font-family="Outfit,sans-serif" font-size="14" font-weight="400"
        fill="#2A5DB0" letter-spacing="3">POLITICAL COMPASS TEST</text>

  <!-- Headline -->
  <text x="80" y="248" font-family="Georgia,'Times New Roman',serif" font-size="82"
        font-weight="700" fill="#0A0C0F" letter-spacing="-2.5">A political compass test</text>
  <text x="80" y="340" font-family="Georgia,'Times New Roman',serif" font-size="82"
        font-weight="700" fill="#0A0C0F" letter-spacing="-2.5">built for
    <tspan font-style="italic" fill="#2A5DB0">nuance.</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="405" font-family="Outfit,sans-serif" font-size="21"
        font-weight="300" fill="#7A7F88">
    Scenario-based questions. Your political position. And a score you did not expect.
  </text>

  <!-- Divider -->
  <line x1="80" y1="454" x2="720" y2="454" stroke="#DDD9D2" stroke-width="1"/>

  <!-- Stats row -->
  <text x="80" y="502" font-family="Georgia,serif" font-size="40" font-weight="700"
        fill="#0A0C0F" letter-spacing="-1">100</text>
  <text x="80" y="528" font-family="Outfit,sans-serif" font-size="13" font-weight="300"
        fill="#B0B5BC" letter-spacing="0.5">questions</text>

  <line x1="234" y1="478" x2="234" y2="535" stroke="#EAE7E1" stroke-width="1"/>

  <text x="254" y="502" font-family="Georgia,serif" font-size="40" font-weight="700"
        fill="#0A0C0F" letter-spacing="-1">3</text>
  <text x="254" y="528" font-family="Outfit,sans-serif" font-size="13" font-weight="300"
        fill="#B0B5BC" letter-spacing="0.5">political axes</text>

  <line x1="408" y1="478" x2="408" y2="535" stroke="#EAE7E1" stroke-width="1"/>

  <text x="428" y="502" font-family="Georgia,serif" font-size="40" font-weight="700"
        fill="#0A0C0F" letter-spacing="-1">2</text>
  <text x="428" y="528" font-family="Outfit,sans-serif" font-size="13" font-weight="300"
        fill="#B0B5BC" letter-spacing="0.5">results incl. bias score</text>

  <!-- Domain pill -->
  <rect x="80" y="558" width="218" height="38" rx="4" fill="#0A0C0F"/>
  <text x="189" y="582" font-family="Outfit,sans-serif" font-size="14" font-weight="400"
        fill="#F9F8F6" text-anchor="middle" letter-spacing="0.5">coreopinion.org</text>

</svg>
