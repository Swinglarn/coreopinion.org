<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F3EF"/>

  <!-- Subtle grain overlay rect -->
  <rect width="1200" height="630" fill="#0A0C0F" opacity="0.025"/>

  <!-- Large decorative "CO" background text -->
  <text x="620" y="520" font-family="Georgia, serif" font-size="620" font-weight="700"
        fill="#0A0C0F" opacity="0.032" text-anchor="middle" letter-spacing="-20">CO</text>

  <!-- Left border accent -->
  <rect x="0" y="0" width="5" height="630" fill="#1C3557"/>

  <!-- Mini compass — top right decorative -->
  <g transform="translate(960, 80)">
    <rect x="0" y="0" width="190" height="190" rx="10" fill="white" opacity="0.7"
          stroke="#DDD9D2" stroke-width="1"/>
    <rect x="8" y="8" width="86" height="86" rx="3" fill="#EEF2FF" opacity="0.6"/>
    <rect x="96" y="8" width="86" height="86" rx="3" fill="#FFF7ED" opacity="0.6"/>
    <rect x="8" y="96" width="86" height="86" rx="3" fill="#F0FDF4" opacity="0.6"/>
    <rect x="96" y="96" width="86" height="86" rx="3" fill="#FEF2F2" opacity="0.6"/>
    <line x1="95" y1="8" x2="95" y2="182" stroke="#DDD9D2" stroke-width="1"/>
    <line x1="8" y1="95" x2="182" y2="95" stroke="#DDD9D2" stroke-width="1"/>
    <!-- Dot in lib-left -->
    <circle cx="54" cy="138" r="10" fill="#0A0C0F"/>
    <circle cx="54" cy="138" r="17" fill="#0A0C0F" opacity="0.12"/>
  </g>

  <!-- Eyebrow -->
  <rect x="80" y="130" width="36" height="1.5" fill="#1C3557"/>
  <text x="128" y="142" font-family="Outfit, sans-serif" font-size="15" font-weight="400"
        fill="#1C3557" letter-spacing="3">POLITICAL COMPASS TEST</text>

  <!-- Main headline -->
  <text x="80" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="86"
        font-weight="700" fill="#0A0C0F" letter-spacing="-3">Find out what you</text>
  <text x="80" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="86"
        font-weight="700" fill="#0A0C0F" letter-spacing="-3" font-style="italic">actually</text>
  <text x="80" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="86"
        font-weight="700" fill="#0A0C0F" letter-spacing="-3">
    <tspan dx="520">believe.</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="415" font-family="Outfit, Georgia, sans-serif" font-size="22"
        font-weight="300" fill="#7A7F88" letter-spacing="0.2">
    Scenario-based questions. Your political position. And a score you did not expect.
  </text>

  <!-- Divider -->
  <line x1="80" y1="465" x2="740" y2="465" stroke="#DDD9D2" stroke-width="1"/>

  <!-- Stats row -->
  <text x="80" y="510" font-family="Georgia, serif" font-size="38" font-weight="700"
        fill="#0A0C0F" letter-spacing="-1">100</text>
  <text x="80" y="535" font-family="Outfit, sans-serif" font-size="13" font-weight="300"
        fill="#B0B5BC" letter-spacing="0.5">questions</text>

  <line x1="228" y1="488" x2="228" y2="540" stroke="#EAE7E1" stroke-width="1"/>

  <text x="248" y="510" font-family="Georgia, serif" font-size="38" font-weight="700"
        fill="#0A0C0F" letter-spacing="-1">3</text>
  <text x="248" y="535" font-family="Outfit, sans-serif" font-size="13" font-weight="300"
        fill="#B0B5BC" letter-spacing="0.5">political axes</text>

  <line x1="396" y1="488" x2="396" y2="540" stroke="#EAE7E1" stroke-width="1"/>

  <text x="416" y="510" font-family="Georgia, serif" font-size="38" font-weight="700"
        fill="#0A0C0F" letter-spacing="-1">2</text>
  <text x="416" y="535" font-family="Outfit, sans-serif" font-size="13" font-weight="300"
        fill="#B0B5BC" letter-spacing="0.5">results incl. bias score</text>

  <!-- Domain badge -->
  <rect x="80" y="562" width="210" height="36" rx="4" fill="#0A0C0F"/>
  <text x="185" y="585" font-family="Outfit, Georgia, sans-serif" font-size="14"
        font-weight="400" fill="#F5F3EF" text-anchor="middle" letter-spacing="0.5">coreopinion.org</text>
</svg>
