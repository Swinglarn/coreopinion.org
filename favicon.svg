<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0A0C0F"/>
  <!-- Quadrant fills — vivid and distinct -->
  <rect x="5" y="5" width="10" height="10" rx="1.5" fill="#4B8EF1" opacity="0.85"/>
  <rect x="17" y="5" width="10" height="10" rx="1.5" fill="#F5A623" opacity="0.85"/>
  <rect x="5" y="17" width="10" height="10" rx="1.5" fill="#3DBF82" opacity="0.85"/>
  <rect x="17" y="17" width="10" height="10" rx="1.5" fill="#E85D6B" opacity="0.85"/>
  <!-- Cross lines -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#0A0C0F" stroke-width="2"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#0A0C0F" stroke-width="2"/>
  <!-- Dot in lib-left (green quadrant) -->
  <circle cx="10" cy="22" r="3" fill="#FFFFFF"/>
</svg>
